name: .NET Core Desktop

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: CyberGuardAssistant.sln   # ✅ FIXED (put your real .sln file)
      Configuration: ${{ matrix.configuration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # ✅ Restore dependencies
    - name: Restore
      run: dotnet restore $env:Solution_Name

    # ✅ Build solution
    - name: Build
      run: dotnet build $env:Solution_Name --configuration $env:Configuration --no-restore

    # ✅ Run tests (WON’T FAIL if you don’t have tests)
    - name: Run tests (optional)
      run: dotnet test $env:Solution_Name --no-build --verbosity normal
      continue-on-error: true

    # ✅ Upload build output instead of MSIX (since most projects don’t have WAP)
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Build Output
        path: |
          **/bin/${{ matrix.configuration }}/**
