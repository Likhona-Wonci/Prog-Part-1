name: .NET Core Desktop

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: CyberGuardAssistant.sln
      Configuration: ${{ matrix.configuration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # ✅ FIX: Use proper Windows env variable syntax
    - name: Restore
      run: dotnet restore %Solution_Name%

    # ✅ FIX
    - name: Build
      run: dotnet build %Solution_Name% --configuration %Configuration% --no-restore

    # ✅ FIX
    - name: Run tests (optional)
      run: dotnet test %Solution_Name% --no-build --verbosity normal
      continue-on-error: true

    # ✅ FIX: Path syntax corrected
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Build Output
        path: |
          **\bin\${{ matrix.configuration }}\**
